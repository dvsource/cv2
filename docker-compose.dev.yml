services:
  cv-editor:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5000:5000"   # Flask API (also accessible directly)
      - "5173:5173"   # Vite dev server with HMR — use this for the UI
    volumes:
      - ./cv.json:/app/cv.json
      - cv-db:/app/db-data
    env_file:
      - path: .env
        required: false
    environment:
      - CV_DB_PATH=/app/db-data/cv_history.db
    develop:
      watch:
        # Python files — Flask debug=True (Werkzeug) auto-reloads on change
        - action: sync
          path: ./server.py
          target: /app/server.py
        - action: sync
          path: ./build_cv.py
          target: /app/build_cv.py
        - action: sync
          path: ./db.py
          target: /app/db.py
        - action: sync
          path: ./llm.py
          target: /app/llm.py
        # React source — Vite HMR picks up changes instantly
        - action: sync
          path: ./web/src
          target: /app/web/src
        - action: sync
          path: ./web/index.html
          target: /app/web/index.html
        # package.json changes need a full rebuild
        - action: rebuild
          path: ./web/package.json

volumes:
  cv-db:
